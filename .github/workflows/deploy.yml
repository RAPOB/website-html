name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cPanel Git deployment
        run: |
          curl -s \
            -H "Authorization: cpanel reubenob:${{ secrets.CPANEL_API_TOKEN }}" \
            -X POST \
            "https://zoe.whsl206.com:2083/execute/VersionControlDeployment/create" \
            -d "repository_root=/home/reubenob/repositories/website-html"
